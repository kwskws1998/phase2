<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLHF Preference Collection</title>
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>RLHF Preference Collection</h1>
            <div class="header-actions">
                <button id="clearAllBtn" class="btn btn-ghost btn-danger" title="Clear all selections" onclick="clearAllSelections()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Clear All
                </button>
                <button id="deleteSessionBtn" class="btn btn-ghost btn-danger" title="Delete session and exit" onclick="deleteSessionAndExit()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6L6 18"/>
                        <path d="M6 6l12 12"/>
                    </svg>
                    Delete &amp; Exit
                </button>
                <button id="downloadBtn" class="btn btn-secondary" title="Download preferences">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download
                </button>
                <button id="saveExitBtn" class="btn btn-primary" title="Save & Exit (Ctrl+S)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save & Exit
                </button>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressPercent">0%</span>
                <span id="progressCount">(0 / 0)</span>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-item status-saved">
                <svg class="status-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                Completed: <strong id="savedCount">0</strong>
            </span>
            <span class="status-item status-remaining">
                <svg class="status-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                </svg>
                Remaining: <strong id="remainingCount">0</strong>
            </span>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>

        <!-- Completion State -->
        <div id="completionState" class="completion-state" style="display: none;">
            <div class="completion-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h2>All prompts completed!</h2>
            <div class="completion-summary">
                <p>Total saved: <strong id="finalSaved">0</strong> preferences</p>
            </div>
            <button id="finalDownloadBtn" class="btn btn-primary btn-large">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download Preferences
            </button>
        </div>

        <!-- Main Content -->
        <main id="mainContent" class="main-content" style="display: none;">
            <!-- Prompt Section with Navigation -->
            <section class="prompt-section">
                <div class="prompt-header">
                    <h2>Prompt</h2>
                    <div class="prompt-navigator">
                        <input type="number" id="promptInput" min="1" value="1" class="prompt-input" />
                        <span class="prompt-total" id="promptTotal">/ 1</span>
                    </div>
                </div>
                <div class="prompt-box" id="promptBox"></div>
            </section>

            <!-- Navigation Section -->
            <div class="nav-section">
                <button class="btn btn-nav" id="prevBtn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Back
                    <span class="shortcut">(B)</span>
                </button>
                <button class="btn btn-skip" id="skipBtn" disabled>
                    Skip
                    <span class="shortcut">(S)</span>
                </button>
                <button class="btn btn-nav" id="nextBtn" disabled>
                    Next
                    <span class="shortcut">(N)</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>

            <!-- Responses Container -->
            <section class="comparison-section">
                <h2>Select the better response</h2>
                <div class="responses-container" id="responsesContainer">
                    <!-- Response cards will be created dynamically -->
                </div>
            </section>
        </main>

        <!-- Keyboard Shortcuts Help -->
        <footer class="shortcuts-help">
            <span><kbd>1</kbd>-<kbd>4</kbd> Select</span>
            <span><kbd>B</kbd> / <kbd>←</kbd> Back</span>
            <span><kbd>N</kbd> / <kbd>→</kbd> Next</span>
            <span><kbd>S</kbd> Skip</span>
            <span><kbd>Ctrl</kbd>+<kbd>S</kbd> Save & Exit</span>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
